<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Laboratorium Nusa Putra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header & Navigation -->
    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-flask"></i>
                <span>Lab Nusa Putra</span>
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
                <li><a href="schedule.html">Jadwal</a></li>
                <li><a href="index.html">Beranda</a></li>
            </ul>
            <div class="user-menu">
                <span id="userName">User</span>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <!-- Dashboard Section -->
    <section class="dashboard-section">
        <div class="container">
            <h2 class="section-title">Dashboard Pengguna</h2>
            
            <div class="dashboard-grid">
                <!-- Profile Card -->
                <div class="dashboard-card profile-card">
                    <h3><i class="fas fa-user"></i> Profil Saya</h3>
                    <div class="profile-info">
                        <div class="profile-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="profile-details">
                            <p><strong>Nama:</strong> <span id="profileName">-</span></p>
                            <p><strong>Email:</strong> <span id="profileEmail">-</span></p>
                            <p><strong>Peran:</strong> <span id="profileRole">-</span></p>
                        </div>
                    </div>
                </div>

                <!-- Messages Card -->
                <div class="dashboard-card messages-card">
                    <h3><i class="fas fa-envelope"></i> Pesan Masuk</h3>
                    <div id="messagesList" class="messages-list">
                        <p class="no-messages">Belum ada pesan masuk</p>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="dashboard-card actions-card">
                    <h3><i class="fas fa-bolt"></i> Aksi Cepat</h3>
                    <div class="quick-actions">
                        <a href="schedule.html" class="action-btn">
                            <i class="fas fa-calendar"></i>
                            <span>Lihat Jadwal</span>
                        </a>
                        <a href="index.html#contact" class="action-btn">
                            <i class="fas fa-paper-plane"></i>
                            <span>Kirim Pesan</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // Check if user is logged in
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        // Display user info
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('profileName').textContent = currentUser.name;
        document.getElementById('profileEmail').textContent = currentUser.email;
        document.getElementById('profileRole').textContent = currentUser.role;

        // Load messages
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('messages') || '[]');
            const messagesList = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                messagesList.innerHTML = '<p class="no-messages">Belum ada pesan masuk</p>';
                return;
            }

            messagesList.innerHTML = messages.map(msg => `
                <div class="message-item">
                    <div class="message-header">
                        <strong>${msg.name}</strong>
                        <span class="message-date">${new Date(msg.date).toLocaleDateString('id-ID')}</span>
                    </div>
                    <p class="message-email">${msg.email}</p>
                    <p class="message-subject">${msg.subject || 'Tanpa Subjek'}</p>
                    <p class="message-text">${msg.message}</p>
                </div>
            `).join('');
        }

        loadMessages();

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('currentUser');
            showNotification('Berhasil keluar!', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        });
    </script>
</body>
</html>
